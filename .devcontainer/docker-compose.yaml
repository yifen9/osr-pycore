services:
  osr-pycore-dev:
    image: ghcr.io/yifen9/osr-pycore-dev
    build:
      context: ..
      dockerfile: Dockerfile.dev
    container_name: osr-pycore-dev
    working_dir: /workspace
    volumes:
      - "..:/workspace"
    command: >
      bash -lc "
        just init &&
        exec sleep infinity
      "
